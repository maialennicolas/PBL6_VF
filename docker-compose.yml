services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecomove-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: ./web
    container_name: ecomove-web
    ports:
      - "8083:8083"
    environment:
      DATA_DIR: /app/data
      SERVER_PORT: 8083
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      SPRING_DATASOURCE_URL: jdbc:mysql://matomo-db:3306/matomo?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: matomo
      SPRING_DATASOURCE_PASSWORD: matomo
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MariaDBDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    volumes:
      - ./data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      matomo-db:
        condition: service_started

  sycd:
    build: ./sycd
    container_name: ecomove-sycd
    environment:
      DATA_DIR: /app/data
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    volumes:
      - ./data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  matomo-db:
    image: mariadb:11
    container_name: ecomove-matomo-db
    command: --max-allowed-packet=64MB
    environment:
      MYSQL_ROOT_PASSWORD: matomo_root
      MYSQL_DATABASE: matomo
      MYSQL_USER: matomo
      MYSQL_PASSWORD: matomo
    volumes:
      - matomo_db:/var/lib/mysql

  matomo:
    image: matomo:5-apache
    container_name: ecomove-matomo
    ports:
      - "8081:80"
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: matomo
      MATOMO_DATABASE_DBNAME: matomo
    volumes:
      - matomo_app:/var/www/html
      # === CAMBIO CLAVE: Mapeamos también la carpeta de configuración ===
      - matomo_config:/var/www/html/config 
    depends_on:
      - matomo-db

  grafana:
    image: grafana/grafana-oss:latest
    container_name: ecomove-grafana
    user: "0" # === CAMBIO CLAVE: Le da permisos de Administrador (root) para poder escribir en tu disco duro de Windows ===
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - matomo-db

volumes:
  matomo_db:
  matomo_app:
  matomo_config: # Nuevo volumen para la configuración de Matomo
  grafana_data: