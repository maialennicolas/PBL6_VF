services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecomove-rabbitmq
    ports:
      - "5671:5671"
      - "15672:15672"
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/tls:/etc/rabbitmq/ssl:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  sonarqube:
    image: sonarqube:lts-community
    container_name: ecomove-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - sonar-db

  sonar-db:
    image: postgres:16
    container_name: ecomove-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_db:/var/lib/postgresql/data

  ecomove-db:
    image: mariadb:11
    container_name: ecomove-db
    command: --max-allowed-packet=64MB
    environment:
      MYSQL_ROOT_PASSWORD: ecomove_root
      MYSQL_DATABASE: ecomove_db
      MYSQL_USER: ecomove
      MYSQL_PASSWORD: ecomove
    volumes:
      - ecomove_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: ./web
    container_name: ecomove-web
    ports:
      - "8083:8083"
    environment:
      DATA_DIR: /app/data
      SERVER_PORT: 8083
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5671
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_TLS_ENABLED: "true"
      RABBITMQ_TRUSTSTORE: /app/tls/truststore.jks
      RABBITMQ_TRUSTSTORE_PASSWORD: pbl6pass
      SPRING_DATASOURCE_URL: jdbc:mysql://ecomove-db:3306/ecomove_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ecomove
      SPRING_DATASOURCE_PASSWORD: ecomove
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MariaDBDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - ./data:/app/data
      - ./rabbitmq/tls/truststore.jks:/app/tls/truststore.jks:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      ecomove-db:
        condition: service_healthy

  sycd:
    build: ./sycd
    container_name: ecomove-sycd
    environment:
      DATA_DIR: /app/data
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5671
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_TLS_ENABLED: "true"
      RABBITMQ_TRUSTSTORE: /app/tls/truststore.jks
      RABBITMQ_TRUSTSTORE_PASSWORD: pbl6pass
      DB_URL: jdbc:mariadb://ecomove-db:3306/ecomove_db?useUnicode=true&characterEncoding=utf8
      DB_USER: ecomove
      DB_PASSWORD: ecomove
    volumes:
      - ./data:/app/data
      - ./rabbitmq/tls/truststore.jks:/app/tls/truststore.jks:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      ecomove-db:
        condition: service_healthy

  matomo-db:
    image: mariadb:11
    container_name: ecomove-matomo-db
    command: --max-allowed-packet=64MB
    environment:
      MYSQL_ROOT_PASSWORD: matomo_root
      MYSQL_DATABASE: matomo
      MYSQL_USER: matomo
      MYSQL_PASSWORD: matomo
    volumes:
      - matomo_db:/var/lib/mysql

  matomo:
    image: matomo:5-apache
    container_name: ecomove-matomo
    ports:
      - "8081:80"
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: matomo
      MATOMO_DATABASE_DBNAME: matomo
    volumes:
      - matomo_app:/var/www/html
    depends_on:
      - matomo-db

  grafana:
    image: grafana/grafana-oss:latest
    container_name: ecomove-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - ecomove-db

volumes:
  ecomove_db:
  matomo_db:
  matomo_app:
  grafana_data:
  sonar_db:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
